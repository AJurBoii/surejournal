{% extends "layout.html" %}
{% block content %}
    <!-- <div class="row p-2 my-2">
        <h2>Welcome to SureJournal</h2>
        <p>This is using a Jinja2 template!</p>
    </div> -->
    {% if journal %}
    <div class="container border-bottom border-2 mb-3 mt-3">
        <div class="row">
            <div class="col">
                <h2>{{ journal.getUser() }}'s Entries</h2>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-auto border border-1 border-black border-end-0 pe-10">Sort By</div>
            <div class="col-auto border border-1 border-black border-start-0">Date Added (Descending)</div>
        </div>
    </div>
    <div class="container">
        <div class="row">
        {% for entry in journal.getEntries().values() %}
            <div class="col bg-light border m-2 g-2">
                <h3>{{ entry.printTimestamp() }}</h3>
                <p>{{ entry.getContent() }}</p>
            </div>
        {% endfor %}
        </div>
    </div>
    {% endif %}
{% endblock content %}
