{% extends "layout.html" %}
{% block content %}
    <h1>SureJournal</h1>
    <h2>Welcome to SureJournal</h2>
    <p>This is using a Jinja2 template!</p>
    {% if entries %}
        <h2>Posts</h2>
    {% endif %}
    {% for entry in entries %}
        <h3>{{ entry.getTimestamp() }}</h3>
        <h4>{{ entry.getUser() }}</h4>
        <p>{{ entry.getEntry() }}</p>
    {% endfor %}
{% endblock content %}
