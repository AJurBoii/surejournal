<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% if title %}
                SureJournal - {{title}}
            {% else %}
                SureJournal
            {% endif %}
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <style>
            .bg-purple {
                background-color: #9b72e7;
            }

            .inter-font {
                font-family: 'Inter', sans-serif;
                font-weight: 200;
                font-style: normal;
            }

            .inter-font-bold {
                font-family: 'Inter', sans-serif;
                font-weight: 700;
                font-style: normal;
            }

            body {
                background-color: #f8f9fa;
                font-family: 'Inter', sans-serif;
            }
        </style>
    </head>
    <nav class="navbar navbar-expand-md bg-purple">
        <div class="container">
            <a href="#" class="navbar-brand inter-font-bold" style="font-size: 2rem;">SureJournal</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <div class="navbar-toggler-icon"></div>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">My Entries</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">About</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <body>
        {% block content %}
        {% endblock content %}
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SureJournal. All rights reserved.</p>
        </div>
    </footer>
</html>
